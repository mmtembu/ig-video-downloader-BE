name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        
      - name: Show me my secrets please
        env:
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "Hex value:"
          echo -n "username: $VPS_USERNAME" | xxd -ps
          echo -n "host: $VPS_HOST" | xxd -ps
          echo -n "deploy dir: $VPS_DEPLOY_DIR" | xxd -ps
          echo -n "ssh key: $VPS_SSH_KEY" | xxd -ps
          echo
          
      - name: Set up SSH key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > private_key
          chmod 600 private_key

      - name: Copy files to VPS
        run: |
          rsync -avz -e "ssh -i private_key -o StrictHostKeyChecking=no" . ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_DIR }}

      - name: Run docker-compose on VPS
        run: |
          ssh -i private_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd ${{ secrets.VPS_DEPLOY_DIR }}
            docker-compose down
            docker-compose up --build -d
          EOF
